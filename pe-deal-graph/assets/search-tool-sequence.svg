<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
  <title id="title">Search tool sequence</title>
  <desc id="desc">Sequence inside search_hybrid: normalize, retrieve, rerank, enrich deals, update state.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f4b5a"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #5b6b7d; stroke-width: 1.4; rx: 8; }
      .tool { fill: #fff7ed; stroke: #b45309; stroke-width: 1.4; rx: 8; }
      .db { fill: #f0fdf4; stroke: #15803d; stroke-width: 1.4; rx: 8; }
      .llm { fill: #f4f8ff; stroke: #5577aa; stroke-width: 1.4; rx: 8; }
      .label { font: 14px Inter, Arial, sans-serif; fill: #172033; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 12px Inter, Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .edge { stroke: #3f4b5a; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="box" x="50" y="80" width="130" height="54"/>
  <text class="label" x="115" y="107">agent</text>

  <rect class="tool" x="250" y="80" width="160" height="54"/>
  <text class="label" x="330" y="107">search_hybrid tool</text>

  <rect class="box" x="490" y="55" width="170" height="54"/>
  <text class="label" x="575" y="82">hybrid retrieval</text>

  <rect class="db" x="740" y="55" width="150" height="54"/>
  <text class="label" x="815" y="82">PostgreSQL</text>

  <rect class="llm" x="490" y="180" width="170" height="54"/>
  <text class="label" x="575" y="207">rerank batches</text>

  <rect class="db" x="740" y="180" width="150" height="54"/>
  <text class="label" x="815" y="207">deals + funds</text>

  <rect class="tool" x="490" y="305" width="170" height="54"/>
  <text class="label" x="575" y="332">Command update</text>

  <rect class="box" x="250" y="305" width="160" height="54"/>
  <text class="label" x="330" y="332">ToolMessage</text>

  <path class="edge" d="M180 107 L250 107"/>
  <text class="small" x="215" y="96">tool call</text>

  <path class="edge" d="M410 107 L490 88"/>
  <text class="small" x="450" y="83">query</text>

  <path class="edge" d="M660 82 L740 82"/>
  <text class="small" x="700" y="70">profile + product SQL</text>

  <path class="edge" d="M815 109 C815 150 650 150 600 180"/>
  <text class="small" x="735" y="146">candidates</text>

  <path class="edge" d="M660 207 L740 207"/>
  <text class="small" x="700" y="195">kept target slugs</text>

  <path class="edge" d="M815 234 C815 284 675 282 610 305"/>
  <text class="small" x="740" y="276">evidence</text>

  <path class="edge" d="M490 332 L410 332"/>
  <text class="small" x="450" y="321">artifact</text>

  <path class="edge" d="M330 305 C250 250 250 150 300 134"/>
  <text class="small" x="250" y="230">state update</text>
</svg>
